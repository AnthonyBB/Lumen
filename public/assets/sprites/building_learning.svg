<svg xmlns="http://www.w3.org/2000/svg" width="220" height="260" viewBox="0 0 220 260"
     shape-rendering="crispEdges" image-rendering="pixelated">

  <!-- Ground shadow -->
  <ellipse cx="110" cy="254" rx="95" ry="8" fill="#000000" fill-opacity="0.18"/>

  <!-- ── Stone walls ── -->
  <rect x="20" y="80" width="180" height="174" fill="#8b8096"/>
  <!-- Horizontal grout lines every 20px -->
  <rect x="20" y="100" width="180" height="2" fill="#6b6076"/>
  <rect x="20" y="120" width="180" height="2" fill="#6b6076"/>
  <rect x="20" y="140" width="180" height="2" fill="#6b6076"/>
  <rect x="20" y="160" width="180" height="2" fill="#6b6076"/>
  <rect x="20" y="180" width="180" height="2" fill="#6b6076"/>
  <rect x="20" y="200" width="180" height="2" fill="#6b6076"/>
  <rect x="20" y="220" width="180" height="2" fill="#6b6076"/>
  <rect x="20" y="240" width="180" height="2" fill="#6b6076"/>
  <!-- Vertical joints row 1 (x offset 0) -->
  <rect x="60"  y="80"  width="2" height="20" fill="#6b6076"/>
  <rect x="110" y="80"  width="2" height="20" fill="#6b6076"/>
  <rect x="160" y="80"  width="2" height="20" fill="#6b6076"/>
  <!-- Vertical joints row 2 (offset) -->
  <rect x="35"  y="100" width="2" height="20" fill="#6b6076"/>
  <rect x="85"  y="100" width="2" height="20" fill="#6b6076"/>
  <rect x="135" y="100" width="2" height="20" fill="#6b6076"/>
  <rect x="185" y="100" width="2" height="20" fill="#6b6076"/>
  <!-- Vertical joints alternating pattern for remaining rows -->
  <rect x="60"  y="120" width="2" height="20" fill="#6b6076"/>
  <rect x="110" y="120" width="2" height="20" fill="#6b6076"/>
  <rect x="160" y="120" width="2" height="20" fill="#6b6076"/>
  <rect x="35"  y="140" width="2" height="20" fill="#6b6076"/>
  <rect x="85"  y="140" width="2" height="20" fill="#6b6076"/>
  <rect x="135" y="140" width="2" height="20" fill="#6b6076"/>
  <rect x="185" y="140" width="2" height="20" fill="#6b6076"/>
  <rect x="60"  y="160" width="2" height="20" fill="#6b6076"/>
  <rect x="110" y="160" width="2" height="20" fill="#6b6076"/>
  <rect x="160" y="160" width="2" height="20" fill="#6b6076"/>
  <rect x="35"  y="180" width="2" height="20" fill="#6b6076"/>
  <rect x="85"  y="180" width="2" height="20" fill="#6b6076"/>
  <rect x="135" y="180" width="2" height="20" fill="#6b6076"/>
  <rect x="185" y="180" width="2" height="20" fill="#6b6076"/>
  <rect x="60"  y="200" width="2" height="20" fill="#6b6076"/>
  <rect x="110" y="200" width="2" height="20" fill="#6b6076"/>
  <rect x="160" y="200" width="2" height="20" fill="#6b6076"/>
  <rect x="35"  y="220" width="2" height="20" fill="#6b6076"/>
  <rect x="85"  y="220" width="2" height="20" fill="#6b6076"/>
  <rect x="135" y="220" width="2" height="20" fill="#6b6076"/>
  <rect x="185" y="220" width="2" height="20" fill="#6b6076"/>
  <rect x="60"  y="240" width="2" height="14" fill="#6b6076"/>
  <rect x="110" y="240" width="2" height="14" fill="#6b6076"/>
  <rect x="160" y="240" width="2" height="14" fill="#6b6076"/>

  <!-- ── Corner turrets ── -->
  <!-- Left turret -->
  <rect x="14" y="70" width="30" height="186" fill="#8b8096"/>
  <rect x="14" y="90"  width="30" height="2" fill="#6b6076"/>
  <rect x="14" y="110" width="30" height="2" fill="#6b6076"/>
  <rect x="14" y="130" width="30" height="2" fill="#6b6076"/>
  <rect x="14" y="150" width="30" height="2" fill="#6b6076"/>
  <rect x="14" y="170" width="30" height="2" fill="#6b6076"/>
  <rect x="14" y="190" width="30" height="2" fill="#6b6076"/>
  <rect x="14" y="210" width="30" height="2" fill="#6b6076"/>
  <rect x="14" y="230" width="30" height="2" fill="#6b6076"/>
  <!-- Left battlements -->
  <rect x="14" y="60" width="8" height="10" fill="#8b8096"/>
  <rect x="24" y="60" width="8" height="10" fill="#8b8096"/>
  <rect x="34" y="60" width="8" height="10" fill="#8b8096"/>
  <!-- Right turret -->
  <rect x="176" y="70" width="30" height="186" fill="#8b8096"/>
  <rect x="176" y="90"  width="30" height="2" fill="#6b6076"/>
  <rect x="176" y="110" width="30" height="2" fill="#6b6076"/>
  <rect x="176" y="130" width="30" height="2" fill="#6b6076"/>
  <rect x="176" y="150" width="30" height="2" fill="#6b6076"/>
  <rect x="176" y="170" width="30" height="2" fill="#6b6076"/>
  <rect x="176" y="190" width="30" height="2" fill="#6b6076"/>
  <rect x="176" y="210" width="30" height="2" fill="#6b6076"/>
  <rect x="176" y="230" width="30" height="2" fill="#6b6076"/>
  <!-- Right battlements -->
  <rect x="176" y="60" width="8" height="10" fill="#8b8096"/>
  <rect x="186" y="60" width="8" height="10" fill="#8b8096"/>
  <rect x="196" y="60" width="8" height="10" fill="#8b8096"/>

  <!-- ── Pointed roof ── -->
  <!-- Deep purple triangle: base from x=10 to x=210 at y=80, apex at x=110,y=10 -->
  <polygon points="110,10 10,80 210,80" fill="#4c1d95"/>
  <!-- Roof highlight stripe -->
  <polygon points="110,10 90,80 110,80" fill="#6d28d9"/>

  <!-- ── Banner between turrets ── -->
  <rect x="44" y="66" width="132" height="14" fill="#fbbf24"/>
  <rect x="104" y="62" width="12" height="4" fill="#fbbf24"/>
  <!-- L mark on banner -->
  <rect x="108" y="68" width="3" height="8" fill="#1e1b4b"/>
  <rect x="108" y="74" width="6" height="2" fill="#1e1b4b"/>

  <!-- ── Stained glass windows ── -->
  <!-- Window frame left -->
  <rect x="42" y="100" width="36" height="48" fill="#1e1b4b"/>
  <rect x="60"  y="96"  width="20" height="8"  fill="#1e1b4b"/>
  <!-- Window glass left -->
  <rect x="44" y="102" width="32" height="44" fill="#3b82f6"/>
  <rect x="52" y="98"  width="16" height="8"  fill="#3b82f6"/>
  <!-- Window pane dividers left -->
  <rect x="59" y="98"  width="2" height="50" fill="#1e1b4b"/>
  <rect x="44" y="122" width="32" height="2"  fill="#1e1b4b"/>

  <!-- Window frame right -->
  <rect x="142" y="100" width="36" height="48" fill="#1e1b4b"/>
  <rect x="160"  y="96"  width="20" height="8"  fill="#1e1b4b"/>
  <!-- Window glass right -->
  <rect x="144" y="102" width="32" height="44" fill="#3b82f6"/>
  <rect x="152" y="98"  width="16" height="8"  fill="#3b82f6"/>
  <!-- Window pane dividers right -->
  <rect x="159" y="98"  width="2" height="50" fill="#1e1b4b"/>
  <rect x="144" y="122" width="32" height="2"  fill="#1e1b4b"/>

  <!-- ── Arched doorway ── -->
  <!-- Door frame stone -->
  <rect x="82" y="174" width="56" height="82" fill="#1e1b2e"/>
  <!-- Arch top (approximated) -->
  <rect x="86" y="162" width="48" height="18" fill="#1e1b2e"/>
  <rect x="90" y="156" width="40" height="8"  fill="#1e1b2e"/>
  <rect x="96" y="152" width="28" height="6"  fill="#1e1b2e"/>
  <!-- Wooden door left panel -->
  <rect x="84" y="176" width="24" height="78" fill="#7c3d12"/>
  <!-- Wooden door right panel -->
  <rect x="110" y="176" width="24" height="78" fill="#7c3d12"/>
  <!-- Door middle bar -->
  <rect x="84" y="214" width="50" height="4"  fill="#4a2608"/>
  <!-- Door knob -->
  <rect x="107" y="220" width="4" height="4"  fill="#fbbf24"/>

  <!-- ── Sign above door ── -->
  <rect x="78" y="144" width="64" height="16" fill="#1e1b2e"/>
  <rect x="79" y="145" width="62" height="14" fill="#6b6076"/>
  <!-- Gold text area -->
  <rect x="82" y="147" width="56" height="10" fill="#fbbf24" fill-opacity="0.4"/>

</svg>
