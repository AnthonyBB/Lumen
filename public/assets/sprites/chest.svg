<svg xmlns="http://www.w3.org/2000/svg" width="48" height="40" viewBox="0 0 48 40"
     shape-rendering="crispEdges" image-rendering="pixelated">

  <!-- Subtle shadow beneath chest -->
  <rect x="4" y="37" width="40" height="3" fill="#3a2a1a" fill-opacity="0.55"/>
  <rect x="8" y="36" width="32" height="2" fill="#3a2a1a" fill-opacity="0.35"/>

  <!-- Chest body — dark mahogany wood -->
  <rect x="2" y="18" width="44" height="18" fill="#7c2d12"/>
  <!-- Body shadow bottom/right -->
  <rect x="2"  y="33" width="44" height="3"  fill="#5a1e0a"/>
  <rect x="38" y="18" width="6"  height="18" fill="#5a1e0a"/>
  <!-- Wood plank lines on body -->
  <rect x="2" y="24" width="36" height="1" fill="#5a1e0a"/>
  <rect x="2" y="29" width="36" height="1" fill="#5a1e0a"/>

  <!-- Chest lid — golden-brown wood -->
  <rect x="2" y="5" width="44" height="14" fill="#a16207"/>
  <!-- Lid top highlight -->
  <rect x="2" y="5"  width="44" height="2"  fill="#d97706"/>
  <rect x="2" y="5"  width="44" height="1"  fill="#c48a1a"/>
  <!-- Lid shadow right -->
  <rect x="38" y="5" width="6" height="14" fill="#92400e"/>
  <!-- Plank line on lid -->
  <rect x="2" y="11" width="36" height="1" fill="#92400e"/>

  <!-- Vertical iron bands on body (2 bands, 3px wide) -->
  <rect x="12" y="18" width="3" height="18" fill="#374151"/>
  <rect x="33" y="18" width="3" height="18" fill="#374151"/>
  <!-- Band highlight edges -->
  <rect x="12" y="18" width="1" height="18" fill="#6b7280"/>
  <rect x="33" y="18" width="1" height="18" fill="#6b7280"/>

  <!-- Central lock plate — gold -->
  <rect x="19" y="14" width="10" height="9"  fill="#fbbf24"/>
  <rect x="20" y="13" width="8"  height="10" fill="#fbbf24"/>
  <!-- Lock border -->
  <rect x="19" y="14" width="10" height="1"  fill="#f59e0b"/>
  <rect x="19" y="14" width="1"  height="9"  fill="#f59e0b"/>
  <rect x="28" y="14" width="1"  height="9"  fill="#92400e"/>
  <rect x="19" y="22" width="10" height="1"  fill="#92400e"/>
  <!-- Keyhole -->
  <rect x="23" y="16" width="2" height="2" fill="#1c1917"/>
  <rect x="23" y="18" width="2" height="3" fill="#1c1917"/>

  <!-- Corner metal studs (gold circles approximated as small rects) -->
  <rect x="3"  y="19" width="3" height="3" fill="#fbbf24"/>
  <rect x="4"  y="18" width="1" height="5" fill="#fbbf24"/>
  <rect x="42" y="19" width="3" height="3" fill="#fbbf24"/>
  <rect x="43" y="18" width="1" height="5" fill="#fbbf24"/>
  <rect x="3"  y="30" width="3" height="3" fill="#fbbf24"/>
  <rect x="4"  y="29" width="1" height="5" fill="#fbbf24"/>
  <rect x="42" y="30" width="3" height="3" fill="#fbbf24"/>
  <rect x="43" y="29" width="1" height="5" fill="#fbbf24"/>

</svg>
