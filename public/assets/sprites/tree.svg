<svg xmlns="http://www.w3.org/2000/svg" width="48" height="64" viewBox="0 0 48 64"
     shape-rendering="crispEdges" image-rendering="pixelated">

  <!-- Root flares at base -->
  <rect x="16" y="56" width="16" height="8"  fill="#7a4a20"/>
  <rect x="12" y="58" width="6"  height="6"  fill="#5a3410"/>
  <rect x="30" y="58" width="6"  height="6"  fill="#5a3410"/>
  <rect x="8"  y="60" width="6"  height="4"  fill="#5a3410"/>
  <rect x="34" y="60" width="6"  height="4"  fill="#5a3410"/>
  <rect x="6"  y="62" width="4"  height="2"  fill="#4a2a0e"/>
  <rect x="38" y="62" width="4"  height="2"  fill="#4a2a0e"/>

  <!-- Trunk main -->
  <rect x="19" y="40" width="10" height="20" fill="#7a4a20"/>
  <!-- Trunk shadow right side -->
  <rect x="25" y="40" width="4"  height="20" fill="#5a3410"/>
  <!-- Trunk highlight left side -->
  <rect x="19" y="40" width="3"  height="20" fill="#9a6030"/>

  <!-- Foliage layer 1 — large base, r~22, center ~(24,38) -->
  <!-- Dark shadow under canopy bottom -->
  <rect x="8"  y="44" width="32" height="4"  fill="#1a5a18"/>
  <rect x="4"  y="40" width="40" height="6"  fill="#1a5a18"/>
  <!-- Main base foliage -->
  <rect x="4"  y="32" width="40" height="14" fill="#2d7a2a"/>
  <rect x="2"  y="34" width="44" height="10" fill="#2d7a2a"/>
  <rect x="6"  y="28" width="36" height="6"  fill="#2d7a2a"/>
  <rect x="10" y="46" width="28" height="4"  fill="#2d7a2a"/>

  <!-- Foliage layer 2 — mid circle, r~17, shifted up 5px, center ~(24,30) -->
  <!-- Dark shadow bottom -->
  <rect x="8"  y="40" width="32" height="2"  fill="#1a5a18"/>
  <!-- Mid foliage -->
  <rect x="8"  y="20" width="32" height="20" fill="#3a9e35"/>
  <rect x="6"  y="22" width="36" height="16" fill="#3a9e35"/>
  <rect x="10" y="18" width="28" height="4"  fill="#3a9e35"/>
  <rect x="12" y="38" width="24" height="4"  fill="#3a9e35"/>

  <!-- Foliage layer 3 — small top, r~12, shifted up 12px, center ~(24,20) -->
  <!-- Dark shadow bottom -->
  <rect x="12" y="28" width="24" height="2"  fill="#1a5a18"/>
  <!-- Top foliage -->
  <rect x="12" y="10" width="24" height="20" fill="#4abe42"/>
  <rect x="10" y="12" width="28" height="16" fill="#4abe42"/>
  <rect x="14" y="8"  width="20" height="4"  fill="#4abe42"/>
  <rect x="14" y="28" width="20" height="4"  fill="#4abe42"/>

  <!-- Top-left crescent highlights on each foliage layer -->
  <!-- Layer 3 highlight -->
  <rect x="12" y="10" width="12" height="6"  fill="#6dd45f"/>
  <rect x="10" y="12" width="10" height="4"  fill="#6dd45f"/>
  <rect x="14" y="8"  width="8"  height="4"  fill="#6dd45f"/>
  <!-- Layer 2 top-left highlight -->
  <rect x="8"  y="22" width="14" height="6"  fill="#6dd45f"/>
  <rect x="6"  y="24" width="12" height="4"  fill="#6dd45f"/>
  <!-- Layer 1 top-left highlight -->
  <rect x="4"  y="34" width="16" height="6"  fill="#6dd45f"/>
  <rect x="6"  y="32" width="12" height="4"  fill="#6dd45f"/>

  <!-- Tiny yellow fruit/flower dots -->
  <rect x="28" y="14" width="2" height="2"  fill="#f9d84a"/>
  <rect x="18" y="22" width="2" height="2"  fill="#f9d84a"/>

</svg>
