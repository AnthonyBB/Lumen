<svg xmlns="http://www.w3.org/2000/svg" width="48" height="64" viewBox="0 0 48 64"
     shape-rendering="crispEdges" image-rendering="pixelated">

  <!-- Root flares -->
  <rect x="17" y="56" width="14" height="8"  fill="#6b4226"/>
  <rect x="13" y="58" width="6"  height="6"  fill="#4a2e1a"/>
  <rect x="29" y="58" width="6"  height="6"  fill="#4a2e1a"/>
  <rect x="10" y="60" width="4"  height="4"  fill="#4a2e1a"/>
  <rect x="34" y="60" width="4"  height="4"  fill="#4a2e1a"/>

  <!-- Trunk -->
  <rect x="19" y="42" width="10" height="18" fill="#6b4226"/>
  <!-- Trunk shadow stripe -->
  <rect x="25" y="42" width="4"  height="18" fill="#4a2e1a"/>

  <!-- Foliage dark base (large, bottom) -->
  <!-- Approximating circle r≈17 at center 24,34 -->
  <rect x="8"  y="30" width="32" height="14" fill="#1a5c2a"/>
  <rect x="6"  y="32" width="36" height="10" fill="#1a5c2a"/>
  <rect x="10" y="28" width="28" height="4"  fill="#1a5c2a"/>
  <rect x="14" y="44" width="20" height="4"  fill="#1a5c2a"/>

  <!-- Foliage mid (medium, center) -->
  <!-- Approximating circle r≈13 at center 24,28 -->
  <rect x="12" y="20" width="24" height="18" fill="#2d7a3a"/>
  <rect x="10" y="22" width="28" height="14" fill="#2d7a3a"/>
  <rect x="14" y="18" width="20" height="4"  fill="#2d7a3a"/>
  <rect x="16" y="36" width="16" height="4"  fill="#2d7a3a"/>

  <!-- Foliage light (small top) -->
  <!-- Approximating circle r≈9 at center 24,20 -->
  <rect x="16" y="14" width="16" height="12" fill="#3d9e4a"/>
  <rect x="14" y="16" width="20" height="8"  fill="#3d9e4a"/>
  <rect x="18" y="12" width="12" height="4"  fill="#3d9e4a"/>
  <rect x="18" y="26" width="12" height="2"  fill="#3d9e4a"/>

  <!-- Highlight cluster -->
  <rect x="18" y="10" width="10" height="8"  fill="#55c45e"/>
  <rect x="16" y="12" width="14" height="4"  fill="#55c45e"/>
  <rect x="14" y="20" width="8"  height="6"  fill="#55c45e"/>

  <!-- Magic sparkle at apex -->
  <rect x="22" y="4"  width="4"  height="4"  fill="#a7f3d0"/>
  <rect x="20" y="6"  width="8"  height="2"  fill="#a7f3d0"/>
  <rect x="23" y="2"  width="2"  height="2"  fill="#a7f3d0"/>
</svg>
