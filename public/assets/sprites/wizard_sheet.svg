    <rect x="15" y="38" width="9"  height="4"  fill="#3b0764"/>
    <rect x="6"  y="33" width="18" height="3"  fill="#fbbf24"/>
    <rect x="10" y="12" width="12" height="10" fill="#fde68a"/>
    <rect x="8"  y="14" width="2"  height="5"  fill="#fde68a"/>
    <rect x="22" y="14" width="2"  height="5"  fill="#fde68a"/>
    <rect x="10" y="15" width="2" height="2" fill="#1e1b4b"/>
    <rect x="18" y="15" width="2" height="2" fill="#1e1b4b"/>
    <rect x="7"  y="11" width="18" height="3"  fill="#312e81"/>
    <rect x="9"  y="9"  width="14" height="2"  fill="#1e1b4b"/>
    <rect x="11" y="7"  width="10" height="2"  fill="#1e1b4b"/>
    <rect x="13" y="5"  width="6"  height="2"  fill="#1e1b4b"/>
    <rect x="14" y="3"  width="4"  height="2"  fill="#1e1b4b"/>
    <rect x="15" y="1"  width="2"  height="2"  fill="#1e1b4b"/>
