  <!-- ═══════════════════════════════════════════════════════
       FRAME 5 (x=160)  Walk left B
  ════════════════════════════════════════════════════════ -->
  <g transform="translate(160,0)">
    <rect x="4"  y="9"  width="3" height="32" fill="#92400e"/>
    <rect x="1"  y="5"  width="9" height="9"  fill="#a5f3fc"/>
    <rect x="2"  y="6"  width="7" height="7"  fill="#67e8f9"/>
    <rect x="6"  y="22" width="18" height="20" fill="#5b21b6"/>
    <rect x="20" y="22" width="4"  height="20" fill="#3b0764"/>
