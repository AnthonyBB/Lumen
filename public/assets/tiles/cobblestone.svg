<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"
     shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- Grout background -->
  <rect x="0" y="0" width="64" height="64" fill="#4a4458"/>

  <!-- Row 0  y=2  stones at x=2,22,42  18×14 -->
  <rect x="2"  y="2"  width="18" height="14" fill="#7c7490"/>
  <rect x="22" y="2"  width="18" height="14" fill="#6b6380"/>
  <rect x="42" y="2"  width="18" height="14" fill="#7c7490"/>
  <!-- Row 0 highlights -->
  <rect x="2"  y="2"  width="2" height="2" fill="#9990a8"/>
  <rect x="22" y="2"  width="2" height="2" fill="#9990a8"/>
  <rect x="42" y="2"  width="2" height="2" fill="#9990a8"/>

  <!-- Row 1  y=18  stones at x=12,32,52 -->
  <rect x="12" y="18" width="18" height="14" fill="#6b6380"/>
  <rect x="32" y="18" width="18" height="14" fill="#7c7490"/>
  <rect x="52" y="18" width="10" height="14" fill="#6b6380"/>
  <rect x="0"  y="18" width="10" height="14" fill="#6b6380"/>
  <!-- Row 1 highlights -->
  <rect x="12" y="18" width="2" height="2" fill="#9990a8"/>
  <rect x="32" y="18" width="2" height="2" fill="#9990a8"/>
  <rect x="52" y="18" width="2" height="2" fill="#9990a8"/>
  <rect x="0"  y="18" width="2" height="2" fill="#9990a8"/>

  <!-- Row 2  y=34  stones at x=2,22,42 -->
  <rect x="2"  y="34" width="18" height="14" fill="#7c7490"/>
  <rect x="22" y="34" width="18" height="14" fill="#6b6380"/>
  <rect x="42" y="34" width="18" height="14" fill="#7c7490"/>
  <!-- Row 2 highlights -->
  <rect x="2"  y="34" width="2" height="2" fill="#9990a8"/>
  <rect x="22" y="34" width="2" height="2" fill="#9990a8"/>
  <rect x="42" y="34" width="2" height="2" fill="#9990a8"/>

  <!-- Row 3  y=50  stones at x=12,32,52 -->
  <rect x="12" y="50" width="18" height="12" fill="#6b6380"/>
  <rect x="32" y="50" width="18" height="12" fill="#7c7490"/>
  <rect x="52" y="50" width="10" height="12" fill="#6b6380"/>
  <rect x="0"  y="50" width="10" height="12" fill="#6b6380"/>
  <!-- Row 3 highlights -->
  <rect x="12" y="50" width="2" height="2" fill="#9990a8"/>
  <rect x="32" y="50" width="2" height="2" fill="#9990a8"/>
  <rect x="52" y="50" width="2" height="2" fill="#9990a8"/>
  <rect x="0"  y="50" width="2" height="2" fill="#9990a8"/>
