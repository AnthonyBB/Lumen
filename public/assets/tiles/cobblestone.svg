<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"
     shape-rendering="crispEdges" image-rendering="pixelated">

  <!-- Grout background: warm grey-brown -->
  <rect x="0" y="0" width="64" height="64" fill="#7a6e5a"/>

  <!-- Row 0  y=2  (unshifted)  stones ~18x12 with 2px grout -->
  <rect x="2"  y="2"  width="18" height="12" fill="#c8b99a"/>
  <rect x="22" y="2"  width="18" height="12" fill="#c8b99a"/>
  <rect x="42" y="2"  width="20" height="12" fill="#c8b99a"/>
