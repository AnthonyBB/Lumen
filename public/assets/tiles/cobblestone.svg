  <rect x="22" y="40" width="18" height="2"  fill="#a89878"/>
  <rect x="38" y="30" width="2"  height="12" fill="#a89878"/>
  <rect x="42" y="40" width="20" height="2"  fill="#a89878"/>
  <rect x="60" y="30" width="2"  height="12" fill="#a89878"/>
