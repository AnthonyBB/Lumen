  <!-- Highlights -->
  <rect x="0"  y="16" width="11" height="1"  fill="#e0d4b8"/>
  <rect x="0"  y="16" width="1"  height="12" fill="#e0d4b8"/>
  <rect x="13" y="16" width="18" height="1"  fill="#e0d4b8"/>
  <rect x="13" y="16" width="1"  height="12" fill="#e0d4b8"/>
  <rect x="33" y="16" width="18" height="1"  fill="#e0d4b8"/>
  <rect x="33" y="16" width="1"  height="12" fill="#e0d4b8"/>
  <rect x="53" y="16" width="11" height="1"  fill="#e0d4b8"/>
  <rect x="53" y="16" width="1"  height="12" fill="#e0d4b8"/>

