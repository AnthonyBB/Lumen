  <rect x="2"  y="12" width="18" height="2"  fill="#a89878"/>
  <rect x="18" y="2"  width="2"  height="12" fill="#a89878"/>
  <rect x="22" y="12" width="18" height="2"  fill="#a89878"/>
  <rect x="38" y="2"  width="2"  height="12" fill="#a89878"/>
  <rect x="42" y="12" width="20" height="2"  fill="#a89878"/>
  <rect x="60" y="2"  width="2"  height="12" fill="#a89878"/>
  <!-- Highlight top/left edges -->
  <rect x="2"  y="2"  width="18" height="1"  fill="#e0d4b8"/>
  <rect x="2"  y="2"  width="1"  height="12" fill="#e0d4b8"/>
  <rect x="22" y="2"  width="18" height="1"  fill="#e0d4b8"/>
  <rect x="22" y="2"  width="1"  height="12" fill="#e0d4b8"/>
  <rect x="42" y="2"  width="20" height="1"  fill="#e0d4b8"/>
  <rect x="42" y="2"  width="1"  height="12" fill="#e0d4b8"/>

  <!-- Row 1  y=16  (offset 9px) -->
  <rect x="0"  y="16" width="11" height="12" fill="#c8b99a"/>
  <rect x="13" y="16" width="18" height="12" fill="#c8b99a"/>
  <rect x="33" y="16" width="18" height="12" fill="#c8b99a"/>
  <rect x="53" y="16" width="11" height="12" fill="#c8b99a"/>
  <!-- Shadows -->
  <rect x="0"  y="26" width="11" height="2"  fill="#a89878"/>
  <rect x="9"  y="16" width="2"  height="12" fill="#a89878"/>
  <rect x="13" y="26" width="18" height="2"  fill="#a89878"/>
  <rect x="29" y="16" width="2"  height="12" fill="#a89878"/>
  <rect x="33" y="26" width="18" height="2"  fill="#a89878"/>
  <rect x="49" y="16" width="2"  height="12" fill="#a89878"/>
  <rect x="53" y="26" width="11" height="2"  fill="#a89878"/>
