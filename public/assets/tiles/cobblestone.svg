  <rect x="13" y="44" width="18" height="12" fill="#c8b99a"/>
  <rect x="33" y="44" width="18" height="12" fill="#c8b99a"/>
  <rect x="53" y="44" width="11" height="12" fill="#c8b99a"/>
  <!-- Shadows -->
  <rect x="0"  y="54" width="11" height="2"  fill="#a89878"/>
  <rect x="9"  y="44" width="2"  height="12" fill="#a89878"/>
  <rect x="13" y="54" width="18" height="2"  fill="#a89878"/>
  <rect x="29" y="44" width="2"  height="12" fill="#a89878"/>
  <rect x="33" y="54" width="18" height="2"  fill="#a89878"/>
  <rect x="49" y="44" width="2"  height="12" fill="#a89878"/>
  <rect x="53" y="54" width="11" height="2"  fill="#a89878"/>
  <rect x="62" y="44" width="2"  height="12" fill="#a89878"/>
