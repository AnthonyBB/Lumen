  <rect x="0"  y="44" width="11" height="1"  fill="#e0d4b8"/>
  <rect x="0"  y="44" width="1"  height="12" fill="#e0d4b8"/>
  <rect x="13" y="44" width="18" height="1"  fill="#e0d4b8"/>
  <rect x="13" y="44" width="1"  height="12" fill="#e0d4b8"/>
  <rect x="33" y="44" width="18" height="1"  fill="#e0d4b8"/>
  <rect x="33" y="44" width="1"  height="12" fill="#e0d4b8"/>
  <rect x="53" y="44" width="11" height="1"  fill="#e0d4b8"/>
  <rect x="53" y="44" width="1"  height="12" fill="#e0d4b8"/>

  <!-- Row 4  y=58  (unshifted partial) -->
  <rect x="2"  y="58" width="18" height="6" fill="#c8b99a"/>
  <rect x="22" y="58" width="18" height="6" fill="#c8b99a"/>
  <rect x="42" y="58" width="20" height="6" fill="#c8b99a"/>
  <!-- Shadows -->
  <rect x="18" y="58" width="2" height="6" fill="#a89878"/>
  <rect x="38" y="58" width="2" height="6" fill="#a89878"/>
  <rect x="60" y="58" width="2" height="6" fill="#a89878"/>
  <!-- Highlights -->
  <rect x="2"  y="58" width="18" height="1" fill="#e0d4b8"/>
  <rect x="2"  y="58" width="1"  height="6" fill="#e0d4b8"/>
  <rect x="22" y="58" width="18" height="1" fill="#e0d4b8"/>
  <rect x="22" y="58" width="1"  height="6" fill="#e0d4b8"/>
  <rect x="42" y="58" width="20" height="1" fill="#e0d4b8"/>
  <rect x="42" y="58" width="1"  height="6" fill="#e0d4b8"/>

</svg>
