<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"
     shape-rendering="crispEdges" image-rendering="pixelated">

  <!-- Base bright mid-green fill -->
  <rect x="0" y="0" width="64" height="64" fill="#4a9e3f"/>

  <!-- Dark patches for depth -->
  <rect x="0"  y="2"  width="6" height="6" fill="#3a8230"/>
  <rect x="14" y="0"  width="4" height="4" fill="#3a8230"/>
  <rect x="28" y="6"  width="6" height="6" fill="#3a8230"/>
  <rect x="44" y="1"  width="4" height="4" fill="#3a8230"/>
  <rect x="56" y="8"  width="6" height="6" fill="#3a8230"/>
  <rect x="4"  y="18" width="6" height="6" fill="#3a8230"/>
  <rect x="20" y="22" width="4" height="4" fill="#3a8230"/>
  <rect x="38" y="16" width="6" height="6" fill="#3a8230"/>
  <rect x="52" y="26" width="4" height="4" fill="#3a8230"/>
  <rect x="8"  y="38" width="4" height="4" fill="#3a8230"/>
  <rect x="24" y="42" width="6" height="6" fill="#3a8230"/>
  <rect x="46" y="36" width="4" height="4" fill="#3a8230"/>
  <rect x="2"  y="52" width="6" height="6" fill="#3a8230"/>
  <rect x="34" y="54" width="4" height="4" fill="#3a8230"/>
  <rect x="56" y="50" width="6" height="6" fill="#3a8230"/>

  <!-- Lighter highlight patches -->
  <rect x="8"  y="4"  width="8" height="6" fill="#5cb84e"/>
  <rect x="36" y="10" width="6" height="4" fill="#5cb84e"/>
  <rect x="50" y="0"  width="8" height="5" fill="#5cb84e"/>
  <rect x="0"  y="28" width="6" height="5" fill="#5cb84e"/>
  <rect x="16" y="32" width="8" height="6" fill="#5cb84e"/>
  <rect x="42" y="28" width="6" height="5" fill="#5cb84e"/>
  <rect x="58" y="36" width="6" height="5" fill="#5cb84e"/>
  <rect x="10" y="50" width="8" height="6" fill="#5cb84e"/>
  <rect x="40" y="48" width="6" height="5" fill="#5cb84e"/>

  <!-- Grass tufts — pairs of 1x4 vertical lines -->
  <rect x="4"  y="10" width="1" height="4" fill="#6dd45f"/>
  <rect x="6"  y="10" width="1" height="4" fill="#6dd45f"/>
  <rect x="20" y="4"  width="1" height="4" fill="#6dd45f"/>
  <rect x="22" y="4"  width="1" height="4" fill="#6dd45f"/>
  <rect x="44" y="12" width="1" height="4" fill="#6dd45f"/>
  <rect x="46" y="12" width="1" height="4" fill="#6dd45f"/>
  <rect x="12" y="28" width="1" height="4" fill="#6dd45f"/>
  <rect x="14" y="28" width="1" height="4" fill="#6dd45f"/>
  <rect x="32" y="34" width="1" height="4" fill="#6dd45f"/>
  <rect x="34" y="34" width="1" height="4" fill="#6dd45f"/>
  <rect x="54" y="20" width="1" height="4" fill="#6dd45f"/>
  <rect x="56" y="20" width="1" height="4" fill="#6dd45f"/>
  <rect x="6"  y="46" width="1" height="4" fill="#6dd45f"/>
  <rect x="8"  y="46" width="1" height="4" fill="#6dd45f"/>
  <rect x="48" y="56" width="1" height="4" fill="#6dd45f"/>
  <rect x="50" y="56" width="1" height="4" fill="#6dd45f"/>

  <!-- Tiny yellow flower -->
  <rect x="18" y="15" width="1" height="3" fill="#1a6b1a"/>
  <rect x="17" y="14" width="2" height="2" fill="#f9d84a"/>

  <!-- Tiny pink flower -->
  <rect x="40" y="45" width="1" height="3" fill="#1a6b1a"/>
  <rect x="39" y="44" width="2" height="2" fill="#ff8fa3"/>

  <!-- Small stone pebbles -->
  <rect x="30" y="16" width="3" height="2" fill="#c8b89a"/>
  <rect x="52" y="40" width="3" height="2" fill="#c8b89a"/>
  <rect x="14" y="56" width="3" height="2" fill="#c8b89a"/>

</svg>
